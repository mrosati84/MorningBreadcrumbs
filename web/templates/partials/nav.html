<ul class="nav-list">
  <li>
    <a href="{% url 'web:home' %}" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">01 ALL</a>
  </li>
  {% for category in categories %}
    <li>
      <a href="{% url 'web:category' category.slug %}" class="{% if active_category_slug == category.slug %}active{% endif %}">
        {{ forloop.counter|stringformat:"02d" }} {{ category.name|upper }}
      </a>
    </li>
  {% endfor %}
</ul>
