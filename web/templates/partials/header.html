<div class="header-top">
  <a href="{% url 'web:home' %}" class="logo">
    <span class="logo-inner">Morning &gt; Breadcrumbs</span>
  </a>
  <div class="header-right">
    <form action="{% url 'web:search' %}" method="get" class="search-form" role="search">
      <label for="search-input" class="visually-hidden">Search</label>
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search-input" type="search" name="q" value="{{ request.GET.q }}" placeholder="Search..." aria-label="Search">
      </div>
    </form>
    <div class="auth-row">
      {% if user.is_authenticated %}
        <a href="{% url 'admin:index' %}" class="btn-admin">ADMIN</a>
        <form method="post" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit" class="btn-logout">LOGOUT</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}" class="btn-login">LOGIN</a>
      {% endif %}
    </div>
  </div>
</div>
