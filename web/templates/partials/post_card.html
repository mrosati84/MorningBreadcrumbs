<article class="post-card">
  {% if post.featured_image %}
    <img class="post-card-image" src="{{ post.featured_image.url }}" alt="">
  {% else %}
    <div class="post-card-image-wrap" aria-hidden="true"></div>
  {% endif %}
  <div class="post-card-body">
    <p class="post-card-tag">{{ post.category.name|upper }}</p>
    <h2 class="post-card-title">
      {% if post.link %}
        <a href="{{ post.link }}">{{ post.title }}</a>
      {% else %}
        {{ post.title }}
      {% endif %}
    </h2>
    {% if post.description %}
      <p class="post-card-description">{{ post.description|truncatewords:25 }}</p>
    {% endif %}
    {% if post.link %}
      <a href="{{ post.link }}" class="post-card-cta">READ MORE →</a>
    {% endif %}
  </div>
</article>
